<svg width="300" height="60" viewBox="0 0 300 60" fill="none" xmlns="http://www.w3.org/2000/svg">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@700&amp;display=swap');
        text { font-family: 'Inter', sans-serif; font-weight: 700; }
    </style>
    
    <!-- Icon Group -->
    <g transform="translate(10, 10)">
        <defs>
            <linearGradient id="logo-gradient" x1="4" y1="4" x2="36" y2="36" gradientUnits="userSpaceOnUse">
                <stop stopColor="#2563EB" />
                <stop offset="1" stopColor="#4F46E5" />
            </linearGradient>
        </defs>
        <rect x="4" y="4" width="32" height="32" rx="10" fill="url(#logo-gradient)" />

        <!-- Pi Symbol -->
        <path d="M12 13H28" stroke="white" strokeWidth="3" strokeLinecap="round" />
        <path d="M17 13V27" stroke="white" strokeWidth="3" strokeLinecap="round" />
        <path d="M23 13V24C23 26 24.5 27 26 27" stroke="white" strokeWidth="3" strokeLinecap="round" />
    </g>

    <!-- Text Group -->
    <g transform="translate(60, 38)">
        <!-- "Free" text -->
        <text fill="#111827" font-size="28">Free</text>
        
        <!-- "Resume" text with gradient -->
        <defs>
            <linearGradient id="text-gradient" x1="0" y1="0" x2="1" y2="0">
                <stop offset="0%" stop-color="#2563EB" />
                <stop offset="100%" stop-color="#4F46E5" />
            </linearGradient>
        </defs>
        <text x="65" fill="url(#text-gradient)" font-size="28">Resume</text>
    </g>
</svg>
