<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OG Image Preview</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
        }
    </style>
</head>

<body class="bg-gray-900 flex items-center justify-center min-h-screen p-10">

    <!-- OG Image Container (1200x630) -->
    <div id="og-card"
        class="relative w-[1200px] h-[630px] bg-white overflow-hidden flex flex-col items-center justify-center text-center shadow-2xl">

        <!-- Background Mesh Gradient -->
        <div class="absolute inset-0 opacity-30">
            <div
                class="absolute top-[-20%] left-[-10%] w-[800px] h-[800px] bg-blue-400 rounded-full mix-blend-multiply filter blur-[120px] opacity-70 animate-blob">
            </div>
            <div
                class="absolute top-[-20%] right-[-10%] w-[800px] h-[800px] bg-purple-400 rounded-full mix-blend-multiply filter blur-[120px] opacity-70 animate-blob animation-delay-2000">
            </div>
            <div
                class="absolute bottom-[-20%] left-[20%] w-[800px] h-[800px] bg-pink-400 rounded-full mix-blend-multiply filter blur-[120px] opacity-70 animate-blob animation-delay-4000">
            </div>
        </div>

        <!-- Grid Pattern Overlay -->
        <div
            class="absolute inset-0 bg-[url('https://grainy-gradients.vercel.app/noise.svg')] opacity-20 mix-blend-overlay">
        </div>

        <!-- Content -->
        <div class="relative z-10 flex flex-col items-center">

            <!-- Logo Icon -->
            <div class="w-32 h-32 mb-8 relative">
                <div class="absolute inset-0 bg-blue-500 blur-2xl opacity-20 rounded-full"></div>
                <img src="/logo.svg" alt="Logo" class="w-full h-full relative z-10 drop-shadow-xl" />
            </div>

            <!-- Title -->
            <h1 class="text-8xl font-extrabold text-gray-900 tracking-tight mb-4">
                Free <span
                    class="text-transparent bg-clip-text bg-gradient-to-r from-blue-600 to-indigo-600">Resume</span>
            </h1>

            <!-- Tagline -->
            <p class="text-4xl text-gray-500 font-medium max-w-3xl leading-relaxed">
                The 100% Free, Privacy-Focused<br />Resume Builder.
            </p>

            <!-- Badges -->
            <div class="flex gap-6 mt-12">
                <div class="flex items-center gap-3 bg-gray-50 border border-gray-200 px-6 py-3 rounded-full">
                    <span class="w-4 h-4 bg-green-500 rounded-full"></span>
                    <span class="text-2xl font-bold text-gray-700">No Sign-Up</span>
                </div>
                <div class="flex items-center gap-3 bg-gray-50 border border-gray-200 px-6 py-3 rounded-full">
                    <span class="w-4 h-4 bg-blue-500 rounded-full"></span>
                    <span class="text-2xl font-bold text-gray-700">Free PDF</span>
                </div>
                <div class="flex items-center gap-3 bg-gray-50 border border-gray-200 px-6 py-3 rounded-full">
                    <span class="w-4 h-4 bg-purple-500 rounded-full"></span>
                    <span class="text-2xl font-bold text-gray-700">ATS Friendly</span>
                </div>
            </div>

        </div>

        <!-- URL at bottom -->
        <div class="absolute bottom-10 text-gray-400 font-semibold text-xl tracking-wider uppercase">
            free-resumepro.vercel.app
        </div>

    </div>

</body>

</html>
